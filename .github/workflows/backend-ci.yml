name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/backend/**"

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and run tests
        run: ./mvnw verify --no-transfer-progress

      - name: Build Docker image
        run: docker build -t peelin-backend:test .
