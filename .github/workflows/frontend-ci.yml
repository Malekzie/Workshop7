name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/frontend/**"

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t peelin-frontend:test .
