name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/backend/**"

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and run tests
        # TODO: re-enable once service tests are updated for the cache-layer + exception refactors.
        # SENTRY_AUTH_TOKEN activates the sentry-upload Maven profile so the source bundle is
        # uploaded keyed under SENTRY_RELEASE; absent token = profile inactive = no upload (the
        # build still succeeds locally for forks without the secret).
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: ./mvnw verify -DskipTests --no-transfer-progress

  docker:
    name: Build & Push Image
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to the Container registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Repository name to lowercase
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@5176d81f87c23d6fc96624dfdbcd9f3830bbe445 # v6.5.0
        with:
          context: ./apps/backend
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}-backend:latest

  deploy:
    name: Deploy to DigitalOcean
    needs: docker
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Deploy the app
        uses: digitalocean/app_action/deploy@0b2a11724d565a7206d1e8aaddcd769cac04c8ec # v2
        env:
          SAMPLE_DIGEST: ${{ needs.docker.outputs.digest }}
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

  pr-preview:
    name: PR Preview
    needs: test
    # B5: skip preview build for fork PRs so DIGITALOCEAN_ACCESS_TOKEN can never
    # be reached from a fork-controlled workflow run.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Docker image
        working-directory: apps/backend
        run: docker build -t peelin-backend:test .
