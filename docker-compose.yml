services:
    postgres:
      image: postgres:17-alpine
      environment:
        POSTGRES_DB: peelin
        POSTGRES_USER: baker
        POSTGRES_PASSWORD: Password1
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data

    valkey:
      image: valkey/valkey:8-alpine
      ports:
        - "6379:6379"
    
volumes:
  postgres_data:
