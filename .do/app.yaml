      - key: DO_SPACES_BUCKET
        scope: RUN_AND_BUILD_TIME
        value: peelin-good-storage
      - key: DO_SPACES_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:mxuZ1jKtFUkpJA91WRbPIDz5w20jRkZh:nds4K+R8NMO90CSzGjJReoCe7hB5clUv8nDI+EgI9X94L1oc]
      - key: DO_SPACES_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:pgZThbtTgxEmPV012Xe7Xie897o1mO3h:lY8BF7emU16WnuNeQUaxsTEqA/bnzG1gVgWtunBce5BpCiqGyKPfLJFMfowLglNWZzhuHNhfTcn9yGE=]
      - key: DO_SPACES_BASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:RjkTXpeJjYsM+G54BNPgBh6OdeqxnmRy:8DQTmCTjBNtEPi/sQcFnkh6lGgk8ztzMQlxMrYkLSWhh1lfVwg4w1Q==]
      # TODO: After commit, set these in DO console → Settings → App-Level Env Vars (mark as Encrypted).
      # The backend has no stripe: section in application-prod.yaml, so without these three vars
      # StripeService.isConfigured() returns false and checkout emits "dev_pi_*" placeholder secrets.
      - key: STRIPE_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: STRIPE_PUBLISHABLE_KEY
        scope: RUN_AND_BUILD_TIME
        value: ""
      # CORS: comma-separated prod frontend origins. Must include protocol + host (no trailing slash).
      - key: APP_CORS_ORIGINS
        scope: RUN_AND_BUILD_TIME
        value: ""
      # Frontend URL used in emails, OAuth redirects. Set to the public site URL.
      - key: FRONTEND_URL
        scope: RUN_AND_BUILD_TIME
        value: ""
      # DO Managed Valkey (same cluster as the DB). SSL required — VALKEY_SSL is the only switch
      # application.yaml reads for TLS. Fill host/port/username/password from DO console → Connection Details.
      - key: VALKEY_HOST
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: VALKEY_PORT
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: VALKEY_USERNAME
        scope: RUN_AND_BUILD_TIME
        value: "default"
      - key: VALKEY_PASSWORD
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: VALKEY_SSL
        scope: RUN_AND_BUILD_TIME
        value: "true"
    github:
      branch: main
      deploy_on_push: false
      repo: Malekzie/Workshop7
    health_check:
      failure_threshold: 24
      http_path: /actuator/health/liveness
      initial_delay_seconds: 120
      period_seconds: 10
      success_threshold: 1
      timeout_seconds: 5
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    liveness_health_check:
      failure_threshold: 24
      http_path: /actuator/health/liveness
      initial_delay_seconds: 120
      period_seconds: 10
      success_threshold: 1
      timeout_seconds: 5
    name: workshop7-apps-backend
    source_dir: apps/backend
