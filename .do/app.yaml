alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
  - rule: DEPLOYMENT_LIVE
databases:
  - cluster_name: app-b7493311-40ec-49aa-ae94-19730fc9fceb
    db_name: dev-database
    engine: PG
    name: dev-database
    production: true
    version: "17"
features:
  - buildpack-stack=ubuntu-22
ingress:
  rules:
    - component:
        name: workshop7-apps-backend
      match:
        authority:
          exact: ""
        path:
          prefix: /api
    - component:
        name: workshop7-apps-backend
      match:
        authority:
          exact: ""
        path:
          prefix: /ws
    - component:
        name: workshop7-apps-backend
      match:
        authority:
          exact: ""
        path:
          prefix: /oauth2
    - component:
        name: workshop7-apps-backend
      match:
        authority:
          exact: ""
        path:
          prefix: /login/oauth2
    - component:
        name: workshop7-apps-backend
      match:
        authority:
          exact: ""
        path:
          prefix: /actuator
    - component:
        name: workshop7-apps-frontend
      match:
        authority:
          exact: ""
        path:
          prefix: /
name: peelin-good
region: tor
services:
  - dockerfile_path: apps/frontend/Dockerfile
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${dev-db-430284.DATABASE_URL}
    github:
      branch: main
      deploy_on_push: false
      repo: Malekzie/Workshop7
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    name: workshop7-apps-frontend
    source_dir: apps/frontend
  - dockerfile_path: apps/backend/Dockerfile
    envs:
      - key: SPRING_PROFILES_ACTIVE
        scope: RUN_AND_BUILD_TIME
        value: prod
      - key: SPRING_DATASOURCE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:DPPiYRSlAFAgjhZ52jRMGlQX7s95iSlz:/OiWzsPbTPB6WjOMVzlRra8scKm0seFe9D8nDaWv51pW+lLGvv6VdeIbpXzZq67YDDVyGvm8Jt83JiGI5A88BQe3jg8PYRz8qY3gnZRDcvRhXn/Io3DwcI3VS+TYS4dr0oNI1HzvYpd1UCC4H24UraD7MVRjqqZvXLECenphtNqigSMnqKBBuMjZVlYVzZU/OzHwGKb0KTo=]
      - key: SPRING_DATASOURCE_USERNAME
        scope: RUN_AND_BUILD_TIME
        type: SECRET
