alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
- rule: DEPLOYMENT_LIVE
databases:
- cluster_name: app-b7493311-40ec-49aa-ae94-19730fc9fceb
  db_name: dev-database
  engine: PG
  name: dev-database
  production: true
  version: "17"
features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  - component:
      name: workshop7-apps-backend
    match:
      authority:
        exact: ""
      path:
        prefix: /api
  - component:
      name: workshop7-apps-backend
    match:
      authority:
        exact: ""
      path:
        prefix: /ws
  - component:
      name: workshop7-apps-backend
    match:
      authority:
        exact: ""
      path:
        prefix: /oauth2
  - component:
      name: workshop7-apps-backend
    match:
      authority:
        exact: ""
      path:
        prefix: /login/oauth2
  - component:
      name: workshop7-apps-backend
    match:
      authority:
        exact: ""
      path:
        prefix: /actuator
  - component:
      name: workshop7-apps-frontend
    match:
      authority:
        exact: ""
      path:
        prefix: /
name: peelin-good
region: tor
services:
- dockerfile_path: apps/frontend/Dockerfile
  envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${dev-db-430284.DATABASE_URL}
  github:
    branch: main
    repo: Malekzie/Peelin-Good
  http_port: 3000
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb
  name: workshop7-apps-frontend
  source_dir: apps/frontend
