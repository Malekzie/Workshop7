alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
  - rule: DEPLOYMENT_LIVE

features:
  - buildpack-stack=ubuntu-22

ingress:
  rules:
    - component:
        name: workshop7-apps-frontend
      match:
        authority:
          exact: ""
        path:
          prefix: /

name: peelin-good-preview
region: tor

services:
  - dockerfile_path: apps/frontend/Dockerfile
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${dev-db-430284.DATABASE_URL}
    github:
      branch: main
      deploy_on_push: false
      repo: Malekzie/Workshop7
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    name: workshop7-apps-frontend
    source_dir: apps/frontend