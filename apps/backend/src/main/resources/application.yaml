spring:
  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}
      username: ${VALKEY_USERNAME:default}
      password: ${VALKEY_PASSWORD:}
      ssl:
        enabled: ${VALKEY_SSL:false}
  application:
    name: Peelin' Good
  config:
    import: optional:file:.env.local[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
  # OAuth
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile
#          microsoft:
#            client-id: ${MICROSOFT_CLIENT_ID}
#            client-secret: ${MICROSOFT_CLIENT_SECRET}
#            scope: openid, email, profile

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-for-local-development-only-32b}
    expiration: ${JWT_EXPIRATION:864000000}
    issuer: ${JWT_ISSUER:peelin-good}
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:8080,http://10.0.2.2:8080,http://localhost:5173}
  resend:
    api-key: ${RESEND_API_KEY}
    from-email: onboarding@resend.dev
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health

sentry:
  dsn: https://a91f0a7472bb4d649eb2e4f2e71b97fa@o4508069461164032.ingest.us.sentry.io/4511153240145920
  # Add data like request headers and IP for users,
  # see https://docs.sentry.io/platforms/java/guides/spring-boot/data-management/data-collected/ for more info
  send-default-pii: true
  # Enable sending logs to Sentry
  logs:
    enabled: true
  # Set traces-sample-rate to 1.0 to capture 100% of transactions for tracing.
  # We recommend adjusting this value in production.
  traces-sample-rate: 1.0
  # Set profile-session-sample-rate to 1.0 to profile 100% of profile sessions.
  profile-session-sample-rate: 1.0
  # Set profile-lifecycle to trace to automatically start and stop
  # profiling when a transaction starts and finishes.
  profile-lifecycle: TRACE