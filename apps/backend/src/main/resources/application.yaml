# OPENROUTER_API_KEY (environment): backend-only secret for Spring AI (OpenRouter). Used for automated review
# moderation and product recommendations. Do not embed this key in mobile or web clients.
spring:
  ai:
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 2000ms
        multiplier: 2
      exclude-on-http-codes: 429,503
    openai:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: openrouter/free
          temperature: 0.2
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}
      username: ${VALKEY_USERNAME:default}
      password: ${VALKEY_PASSWORD:}
      ssl:
        enabled: ${VALKEY_SSL:false}
      repositories:
        enabled: false
  application:
    name: Peelin' Good
  config:
    import: optional:file:.env[.properties],optional:file:.env.local[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: "5000"
          timeout: "5000"
          writetimeout: "5000"
  # OAuth
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile
          microsoft:
            provider: microsoft
            client-id: ${MICROSOFT_CLIENT_ID}
            client-secret: ${MICROSOFT_CLIENT_SECRET}
            scope: openid, email, profile
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-for-local-development-only-32b}
    expiration: ${JWT_EXPIRATION:864000000}
    issuer: ${JWT_ISSUER:peelin-good}
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:8080,http://10.0.2.2:8080,http://localhost:5173}

  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  email:
    logo-path: ${EMAIL_LOGO_PATH:../frontend/static/images/Peelin' Good.png}

server:
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health

sentry:
  dsn: https://a91f0a7472bb4d649eb2e4f2e71b97fa@o4508069461164032.ingest.us.sentry.io/4511153240145920
  # Add data like request headers and IP for users,
  # see https://docs.sentry.io/platforms/java/guides/spring-boot/data-management/data-collected/ for more info
  send-default-pii: true
  # Enable sending logs to Sentry
  logs:
    enabled: true
  # Set traces-sample-rate to 1.0 to capture 100% of transactions for tracing.
  # We recommend adjusting this value in production.
  traces-sample-rate: 1.0
  # Set profile-session-sample-rate to 1.0 to profile 100% of profile sessions.
  profile-session-sample-rate: 1.0
  # Set profile-lifecycle to trace to automatically start and stop
  # profiling when a transaction starts and finishes.
  profile-lifecycle: TRACE
