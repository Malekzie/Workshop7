# OPENROUTER_API_KEY (environment): backend-only secret for Spring AI (OpenRouter). Used for automated review
# moderation and product recommendations. Do not embed this key in mobile or web clients.
spring:
  ai:
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 2000ms
        multiplier: 2
      exclude-on-http-codes: 429,503
    openai:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: openrouter/free
          temperature: 0.2
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:25061}
      username: ${VALKEY_USERNAME:default}
      password: ${VALKEY_PASSWORD:}
      ssl:
        enabled: ${VALKEY_SSL:false}
      repositories:
        enabled: false
  application:
    name: Peelin' Good
  config:
    import: optional:file:.env[.properties],optional:file:.env.local[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: "5000"
          timeout: "5000"
          writetimeout: "5000"
  # OAuth
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile
          microsoft:
            provider: microsoft
            client-id: ${MICROSOFT_CLIENT_ID}
            client-secret: ${MICROSOFT_CLIENT_SECRET}
            scope: openid, email, profile
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub

app:
  jwt:
    # No default: EnvValidator fails fast at startup if JWT_SECRET is unset.
    # Reusing a shared literal across envs made token forgery trivial (CWE-798).
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:864000000}
    issuer: ${JWT_ISSUER:peelin-good}
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:8080,http://10.0.2.2:8080,http://localhost:5173}

  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  email:
    logo-path: ${EMAIL_LOGO_PATH:../frontend/static/images/Peelin' Good.png}

server:
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health

sentry:
  # DSN must come from environment; empty string disables the SDK cleanly.
  dsn: ${SENTRY_DSN:}
  # SENTRY_RELEASE (git SHA in CI) ties events to the source bundle uploaded by the Maven plugin
  # so stack traces resolve to source. SENTRY_ENVIRONMENT separates prod/preview/dev in the UI.
  # Both are optional: empty means the SDK omits the field rather than fabricating one.
  release: ${SENTRY_RELEASE:}
  environment: ${SENTRY_ENVIRONMENT:}
  # Do not attach request headers, cookies, or client IP — opt in explicitly per-event if needed.
  send-default-pii: false
  logs:
    enabled: true
  # Dev default: sample heavily so traces are visible locally. Prod overrides below.
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.2}
  profile-session-sample-rate: ${SENTRY_PROFILE_SAMPLE_RATE:0.2}
  profile-lifecycle: TRACE
