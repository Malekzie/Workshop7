spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/peelin}
    username: ${SPRING_DATASOURCE_USERNAME:peelin}
    password: ${SPRING_DATASOURCE_PASSWORD:peelin}
    # Small DO tiers have very few connections for non-superuser roles; keep pool tiny so Flyway + JPA can start.
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0
      connection-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: none
  data:
    redis:
      url: ""
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  spaces:
    endpoint: ${DO_SPACES_ENDPOINT:}
    bucket: ${DO_SPACES_BUCKET:}
    access-key: ${DO_SPACES_KEY:}
    secret-key: ${DO_SPACES_SECRET:}
    base_url: ${DO_SPACES_BASE_URL:}
    prefix: ${DO_SPACES_PREFIX:customers}