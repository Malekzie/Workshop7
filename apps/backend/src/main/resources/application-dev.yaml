spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/peelin}
    username: ${SPRING_DATASOURCE_USERNAME:peelin}
    password: ${SPRING_DATASOURCE_PASSWORD:peelin}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration