# Active by default (spring.profiles.active=dev). Pins OAuth redirect_uri to loopback so it matches
# the same "Web application" client entry you use for the Svelte app (localhost) — no per-LAN-IP URIs.
# Mobile: use api.base.url=http://127.0.0.1:8080/ and run: adb reverse tcp:8080 tcp:8080
#
# Postgres (managed / small tier): if startup fails with
#   FATAL: remaining connection slots are reserved for roles with the SUPERUSER attribute
# the server has NO free slots for your DB user (every non-superuser slot is taken). This app
# cannot fix that from code alone. You must:
#   - Close DBeaver, pgAdmin, Metabase, other Spring Boot instances, teammates' sessions, etc.
#   - In DigitalOcean: use the "Connection pool" / pooler URL+port if offered (multiplexes clients).
#   - Or resize the cluster / increase max_connections, or wait ~2 min (DO sometimes caches the error).
# Hikari + Flyway retries below only shrink this app and retry if a slot appears briefly.
#
# Flyway: shared/cloud DBs sometimes have history that does not match this repo (e.g. V28 applied on
# DO but removed locally in favor of V29). Flyway 9+ ignores that only via ignore-migration-patterns
# (`ignore-missing-migrations` no longer fixes "applied migration not resolved locally"). To clean the
# DB permanently, run: flyway repair (CLI) or delete the stray row from flyway_schema_history.
#
# Mail: without MAIL_USERNAME / MAIL_PASSWORD the SMTP health check fails and logs a WARN when
# something touches overall health (e.g. JMX). Disable that indicator in dev; enable mail checks in prod.
#
# Redis: default spring.data.redis points at localhost:6379 (.env.example / docker). If Valkey/Redis is not
# running locally, RedisReactiveHealthIndicator logs a WARN when health is probed. Disable in dev or run Redis.
management:
  health:
    mail:
      enabled: false
    redis:
      enabled: false
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/peelin}
    username: ${SPRING_DATASOURCE_USERNAME:baker}
    password: ${SPRING_DATASOURCE_PASSWORD:Password1}
    # Small DO tiers have very few connections for non-superuser roles; keep pool tiny so Flyway + JPA can start.
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 300000
      connection-timeout: 30000
  data:
    redis:
      # Dev defaults to local Valkey; override with SPRING_DATA_REDIS_URL when needed.
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration/core,classpath:db/migration/seed
    validate-on-migrate: false
    repair-on-migrate: true
    connect-retries: 20
    connect-retries-interval: 3s
    ignore-migration-patterns:
      - "*:missing"
    out-of-order: true
    # After one successful run, align the DB with: UPDATE flyway_schema_history SET checksum = -316084932 WHERE version = '10';
    # Then set validate-on-migrate back to true (or omit).
  spaces:
    endpoint: ${DO_SPACES_ENDPOINT:}
    bucket: ${DO_SPACES_BUCKET:}
    access-key: ${DO_SPACES_KEY:}
    secret-key: ${DO_SPACES_SECRET:}
    base_url: ${DO_SPACES_BASE_URL:}
    prefix: ${DO_SPACES_PREFIX:customers}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: "http://localhost:${server.port:8080}/login/oauth2/code/{registrationId}"
          microsoft:
            redirect-uri: "http://localhost:${server.port:8080}/login/oauth2/code/{registrationId}"

# Without STRIPE_SECRET_KEY, checkout uses an in-process placeholder (no live card capture).
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
