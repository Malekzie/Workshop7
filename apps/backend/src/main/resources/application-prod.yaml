spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        # DigitalOcean Managed PostgreSQL requires SSL; URL in secrets may omit sslmode.
        sslmode: require
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    # Migrations live flat under db/migration/ (no core/ subfolder) — load the parent so V46/V47 are picked up.
    locations: classpath:db/migration
    default-schema: public
    schemas: public
    # DB holds history rows (V0-V45) from prior seed migrations no longer in classpath.
    # Skip validation + auto-repair so startup doesn't fail on "applied migration not resolved locally".
    validate-on-migrate: false
    repair-on-migrate: true
    ignore-migration-patterns:
      - "*:ignored"
      - "*:missing"
  spaces:
    endpoint: ${DO_SPACES_ENDPOINT:}
    bucket: ${DO_SPACES_BUCKET:}
    access-key: ${DO_SPACES_KEY:}
    secret-key: ${DO_SPACES_SECRET:}
    base_url: ${DO_SPACES_BASE_URL:}
    prefix: ${DO_SPACES_PREFIX:customers}
  # Redis/Valkey connection is inherited from application.yaml (VALKEY_* env vars).
  # The nested ${REDIS_*:${VALKEY_*:}} fallback here was breaking port binding when DO
  # surfaced the outer var as an empty string, so let the base config win.

app:
  cookie:
    # Belt-and-suspenders; AuthController already defaults this to true, but pin it explicitly in prod.
    secure: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

sentry:
  # DSN required in prod, but validated by EnvValidator, not via Spring placeholder (so boot
  # can still log the missing-env banner instead of failing with an unhelpful Spring error).
  dsn: ${SENTRY_DSN:}
  send-default-pii: false
  logs:
    enabled: true
  # Production sampling: low by default, bump per-release with env overrides.
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.05}
  profile-session-sample-rate: ${SENTRY_PROFILE_SAMPLE_RATE:0.05}
  profile-lifecycle: TRACE