spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        # DigitalOcean Managed PostgreSQL requires SSL; URL in secrets may omit sslmode.
        sslmode: require
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration/core
    default-schema: public
    schemas: public
    # *:missing — DB history may list a version no longer in the repo (e.g. old V28); Flyway 9+ requires this pattern (not ignore-missing-migrations).
    ignore-migration-patterns:
      - "*:ignored"
      - "*:missing"
  spaces:
    endpoint: ${DO_SPACES_ENDPOINT:}
    bucket: ${DO_SPACES_BUCKET:}
    access-key: ${DO_SPACES_KEY:}
    secret-key: ${DO_SPACES_SECRET:}
    base_url: ${DO_SPACES_BASE_URL:}
    prefix: ${DO_SPACES_PREFIX:customers}
  data:
    redis:
      host: ${REDIS_HOST:}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      port: ${REDIS_PORT:}
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

sentry:
  dsn: https://a91f0a7472bb4d649eb2e4f2e71b97fa@o4508069461164032.ingest.us.sentry.io/4511153240145920
  # Add data like request headers and IP for users,
  # see https://docs.sentry.io/platforms/java/guides/spring-boot/data-management/data-collected/ for more info
  send-default-pii: true
  # Enable sending logs to Sentry
  logs:
    enabled: true
  # Set traces-sample-rate to 1.0 to capture 100% of transactions for tracing.
  # We recommend adjusting this value in production.
  traces-sample-rate: 1.0
  # Set profile-session-sample-rate to 1.0 to profile 100% of profile sessions.
  profile-session-sample-rate: 1.0
  # Set profile-lifecycle to trace to automatically start and stop
  # profiling when a transaction starts and finishes.
  profile-lifecycle: TRACE