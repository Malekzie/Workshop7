spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        # DigitalOcean Managed PostgreSQL requires SSL; URL in secrets may omit sslmode.
        sslmode: require
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public
    schemas: public
  spaces:
    endpoint: ${DO_SPACES_ENDPOINT:}
    bucket: ${DO_SPACES_BUCKET:}
    access-key: ${DO_SPACES_KEY:}
    secret-key: ${DO_SPACES_SECRET:}
    base_url: ${DO_SPACES_BASE_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never